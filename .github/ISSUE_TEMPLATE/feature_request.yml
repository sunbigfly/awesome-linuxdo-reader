name: 功能建议
description: 提议与阅读体验直接相关的新能力或改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 说明当前遇到的问题，以及谁会受益
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的行为，不必限定实现方式
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 现有替代方式
  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 可能涉及的页面、设置、权限或兼容性
